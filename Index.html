<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Newt Combat</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://app.adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a2a35; color: white; text-align: center; margin: 0; overflow: hidden; user-select: none; }
        #score { font-size: 80px; font-weight: bold; color: #00ffd5; margin-top: 30px; text-shadow: 0 0 20px rgba(0,255,213,0.5); }
        #click-circle {
            width: 250px; height: 250px; border: 8px solid #00ffd5; border-radius: 50%;
            margin: 40px auto; display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, #2c3e50 0%, #1a2a35 100%);
            box-shadow: 0 0 30px rgba(0,255,213,0.3); transition: transform 0.05s; cursor: pointer; position: relative;
        }
        #click-circle:active { transform: scale(0.92); }
        #newt-img { width: 85%; pointer-events: none; }
        .stats { margin-top: 10px; font-size: 16px; opacity: 0.9; }
        #energy-bar-container { width: 85%; height: 12px; background: rgba(255,255,255,0.1); margin: 10px auto; border-radius: 10px; border: 1px solid rgba(0,255,213,0.3); }
        #energy-bar { width: 100%; height: 100%; background: #00ffd5; border-radius: 10px; transition: width 0.2s; box-shadow: 0 0 10px #00ffd5; }
        .btn-group { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 20px; }
        button { padding: 15px; font-size: 16px; border-radius: 12px; border: none; cursor: pointer; width: 85%; font-weight: bold; transition: 0.2s; }
        #upgrade-btn { background: #00ffd5; color: #1a2a35; }
        #ads-btn { background: #f1c40f; color: #1a2a35; }
        #leader-btn { background: white; color: #1a2a35; }
        /* Стиль для летающей цифры */
        .floating-text {
            position: absolute; color: #00ffd5; font-size: 28px; font-weight: bold;
            pointer-events: none; animation: floatUp 0.6s ease-out forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="score">0</div>
    
    <div id="click-circle" onclick="clickNewt(event)">
        <img src="newt.png" id="newt-img" alt="Triton">
    </div>

    <div class="stats">⚡ Энергия: <span id="energy">1000</span>/1000</div>
    <div id="energy-bar-container"><div id="energy-bar"></div></div>

    <div class="btn-group">
        <button id="upgrade-btn" onclick="upgrade()">💪 Качать (+<span id="pwr-display">2</span>)</button>
        <button id="ads-btn" onclick="showAd()">📺 Реклама (+500)</button>
        <button id="leader-btn" onclick="alert('Лидерборд скоро появится в обновлении!')">🏆 ТАБЛИЦА ЛИДЕРОВ</button>
    </div>

    <script>
        let score = 0;
        let energy = 1000;
        let power = 2;
        const AdController = window.Adsgram.init({ blockId: "27337" });

        function clickNewt(e) {
            if (energy >= power) {
                score += power;
                energy -= power;
                
                // Создаем надпись +X
                const float = document.createElement('div');
                float.className = 'floating-text';
                float.innerText = '+' + power;
                float.style.left = e.clientX - 20 + 'px';
                float.style.top = e.clientY - 40 + 'px';
                document.body.appendChild(float);
                setTimeout(() => float.remove(), 600);

                updateUI();
            }
        }

        function upgrade() {
            let cost = power * 50;
            if (score >= cost) {
                score -= cost;
                power += 1;
                updateUI();
            } else {
                alert("Нужно " + cost + " очков!");
            }
        }

        function showAd() {
            AdController.show().then(() => {
                score += 500;
                updateUI();
            }).catch(() => alert("Реклама загружается..."));
        }

        function updateUI() {
            document.getElementById('score').innerText = score;
            document.getElementById('energy').innerText = energy;
            document.getElementById('pwr-display').innerText = power;
            document.getElementById('energy-bar').style.width = (energy / 10) + '%';
        }

        setInterval(() => { if (energy < 1000) { energy += 5; updateUI(); } }, 1500);
    </script>
</body>
</html>
