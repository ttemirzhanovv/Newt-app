<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Newt Combat Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-adlib.js"></script>
    <style>
        body { background: radial-gradient(circle, #0f2027, #203a43, #2c5364); color: white; text-align: center; font-family: sans-serif; height: 100vh; overflow: hidden; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .score { font-size: 50px; font-weight: 900; color: #00ffcc; margin-top: 20px; }
        .coin-btn { width: 250px; height: 250px; border-radius: 50%; border: 8px solid #00ffcc; background: url('https://img.icons8.com/clouds/500/salamander.png') center/cover; outline: none; transition: transform 0.05s; margin: auto; -webkit-tap-highlight-color: transparent; }
        .coin-btn:active { transform: scale(0.95); }
        .energy-section { width: 85%; margin-bottom: 20px; }
        .energy-fill { height: 10px; background: #00ffcc; border-radius: 10px; transition: width 0.2s; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 90%; margin-bottom: 20px; }
        .btn { background: #00ffcc; border: none; color: #000; padding: 12px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="score" id="balance">0</div>
    <button class="coin-btn" id="coinBtn"></button>
    <div class="energy-section">
        <div style="display:flex; justify-content:space-between; font-size: 14px; margin-bottom:5px;">
            <span>⚡ Энергия</span> <span id="energy-val">1000/1000</span>
        </div>
        <div style="background:#111; border-radius:10px;"><div class="energy-fill" id="energy-fill" style="width:100%"></div></div>
    </div>
    <div class="btn-group">
        <button class="btn" onclick="upgradeClick()">💪 Качать (+<span id="p-val">1</span>)</button>
        <button class="btn" style="background:#f1c40f" onclick="showAd()">📺 Реклама (+500)</button>
        <button class="btn" style="background:#fff; grid-column: span 2;" onclick="alert('ТОП:\n1. ТЫ\n2. Janh\n3. Dayana')">🏆 ТАБЛИЦА ЛИДЕРОВ</button>
    </div>
    <script>
        let tg = window.Telegram.WebApp;
        let coins = Number(localStorage.getItem('n_coins')) || 0;
        let energy = Number(localStorage.getItem('n_energy')) || 1000;
        let power = Number(localStorage.getItem('n_power')) || 1;
        function update() {
            document.getElementById('balance').innerText = Math.floor(coins);
            document.getElementById('energy-val').innerText = energy + "/1000";
            document.getElementById('energy-fill').style.width = (energy/10) + "%";
            document.getElementById('p-val').innerText = power;
            localStorage.setItem('n_coins', coins);
            localStorage.setItem('n_energy', energy);
            localStorage.setItem('n_power', power);
        }
        document.getElementById('coinBtn').addEventListener('click', (e) => {
            if (energy >= power) {
                coins += power; energy -= power;
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                update();
            }
        });
        window.showAd = function() {
            coins += 500; energy = 1000;
            alert("Бонус получен! (Когда вставим ID, тут будет реклама)");
            update();
        };
        setInterval(() => { if(energy < 1000) energy++; update(); }, 1000);
        window.upgradeClick = function() {
            let price = power * 100;
            if (coins >= price) { coins -= price; power++; update(); }
            else { alert("Нужно " + price + " монет!"); }
        };
        update();
    </script>
</body>
</html>
