<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Newt Combat Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://app.adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0b10; color: white; text-align: center; margin: 0; overflow: hidden; user-select: none; }
        #score { font-size: 60px; font-weight: bold; margin-top: 20px; color: #00ffd4; text-shadow: 0 0 20px rgba(0,255,212,0.5); }
        
        #click-circle {
            width: 240px; height: 240px; border-radius: 50%; border: 8px solid #00ffd4;
            margin: 40px auto; display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, #1a1c25 0%, #0a0b10 100%);
            box-shadow: 0 0 40px #00ffd444; cursor: pointer; transition: transform 0.1s;
        }
        #click-circle:active { transform: scale(0.95); }
        #newt-img { width: 80%; pointer-events: none; }

        .stats { font-size: 16px; margin: 10px; color: #aaa; }
        #energy-container { width: 80%; height: 12px; background: #222; margin: 10px auto; border-radius: 10px; overflow: hidden; }
        #energy-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #ffcc00, #ffea00); transition: width 0.3s; }

        .btn {
            width: 85%; padding: 15px; margin: 10px auto; border: none; border-radius: 12px;
            font-size: 16px; font-weight: bold; cursor: pointer; display: block; transition: 0.3s;
        }
        #upgrade-btn { background: #00ffd4; color: #000; }
        #ad-btn { background: #ffcc00; color: #000; }
        #share-btn { background: #3399ff; color: #fff; }
        
        .btn:disabled { background: #444 !important; color: #888; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="score">0</div>
    <div class="stats">Сила клика: +<span id="power">1</span></div>
