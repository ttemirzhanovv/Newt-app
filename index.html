<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; }
        #circle { width: 200px; height: 200px; background: green; border-radius: 50%; margin: 50px auto; }
    </style>
</head>
<body>
    <h1 id="score">0</h1>
    <div id="circle" onclick="clickTest()"></div>
    <button style="padding: 20px;" onclick="alert('Работает!')">ПРОВЕРКА</button>

    <script>
        let s = 0;
        function clickTest() {
            s++;
            document.getElementById('score').innerText = s;
        }
    </script>
</body>
</html>
